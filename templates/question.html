<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstroTest — Question</title>
</head>
<body>
    <h1>Question {{ num }}</h1>
    <p>{{ question.text }}</p>
    {% if result %}
        <p>{{ result }}</p>
        {% if next_num %}
        <a href="/question/{{ next_num }}"><button>Next Question</button></a>
        {% else %}
        <a href="/results"><button>See Results</button></a>
        {% endif %}
    {% else %}
        {% for option in question.answers %}
        <a href="/answer?num={{ num }}&answer={{ option }}"><button>{{ option }}</button></a>
        {% endfor %}
    {% endif %}
</body>
</html>
